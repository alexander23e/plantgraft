{% extends 'report.html' %}
{% load static %}
{% block head_report %}
    <script src="{% static 'provider_report/js/report.js' %}" type="text/javascript"></script>
{% endblock %}

{% block content_report %}
    <div class="row">
        <div class="col-lg-12">
            <div class="form-group">
                <label>{{ form.search.label }}:</label>
                <div class="input-group mb-3">
                    {{ form.search }}
                    <div class="input-group-append">
                        <button class="btn btn-danger btnClearSearch" type="button"><i class="fas fa-times"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-lg-12">
            <hr>
            <table class="table table-bordered" id="tblReport" style="width:100%;">
                <thead>
                <tr>
                    <th style="width: 10%;" class="text-center">Número</th>
                    <th style="width: 20%;">Nombres</th>
                    <th style="width: 15%;">Número de ruc</th>
                    <th style="width: 15%;">Teléfono</th>
                    <th style="width: 15%;">Email</th>
                    <th style="width: 25%;">Dirección</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
{% endblock %}
