{% extends 'login/base.html' %}
{% load static %}
{% block head_login %}
    <script src="{% static 'lib/formvalidation-1.9.0/js/plugins/PasswordStrength.min.js' %}"></script>
    <script src="{% static 'lib/formvalidation-1.9.0/js/zxcvbn.js' %}"></script>
    <script src="{% static 'login/js/update_password.js' %}"></script>
{% endblock %}

{% block content %}
    <div class="row d-flex justify-content-center">
        <div class="col-lg-5 mt-1">
            <form method="post" id="frmForm" autocomplete="off" data-url="{{ list_url }}">
                <div class="card">
                    <div class="card-header">
                        <p class="text-center text-icon">
                            <span class="fa-stack fa-3x"><i class="fa-solid fa-circle fa-stack-2x"></i><i class="{{ dashboard.get_icon }} fa-stack-1x logo"></i></span>
                        </p>
                        <h1 class="card-title text-center p-2 m-0">Reseteo de Password</h1>
                    </div>
                    <div class="card-body p-4">
                        {% csrf_token %}
                        <input type="hidden" name="next" value="{{ next }}">
                        <div class="input-group mb-3">
                            <div class="form-floating">
                                {{ form.password }}
                                <label for="floatingInput">{{ form.password.label }}</label>
                            </div>
                            <button class="input-group-text btn btn-success btnShowPassword" type="button">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="input-group mb-3">
                            <div class="form-floating">
                                {{ form.confirm_password }}
                                <label for="floatingInput">{{ form.confirm_password.label }}</label>
                            </div>
                            <button class="input-group-text btn btn-success btnShowPassword" type="button">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="progress password-progress">
                            <div id="strengthBar" class="progress-bar" role="progressbar" style="width: 0;"></div>
                        </div>
                    </div>
                    <div class="card-footer px-5 pt-3">
                        <div class="d-grid gap-2 mt-2">
                            <button type="submit" class="btn btn-success btn-lg">
                                <i class="fas fa-sign-in-alt"></i> Cambiar Contraseña
                            </button>
                        </div>
                        <p class="mt-3 text-center fw-normal">
                            Si deseas retornar<a href="{{ list_url }}"> da click aqui</a>
                        </p>
                    </div>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
