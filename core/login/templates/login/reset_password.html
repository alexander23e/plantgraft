{% extends 'login/base.html' %}
{% load static %}
{% block head_login %}
    <script src="{% static 'login/js/reset_password.js' %}"></script>
{% endblock %}

{% block content %}
    <div class="row d-flex justify-content-center">
        <div class="col-lg-5 mt-1">
            <form method="post" id="frmForm" autocomplete="off" data-url="{{ list_url }}">
                <div class="card">
                    <div class="card-header">
                        <p class="text-center text-icon">
                            <span class="fa-stack fa-3x"><i class="fa-solid fa-circle fa-stack-2x"></i><i class="{{ dashboard.get_icon }} fa-stack-1x logo"></i></span>
                        </p>
                        <h1 class="card-title text-center p-2 m-0">Reseteo de contraseña</h1>
                    </div>
                    <div class="card-body p-4">
                        {% csrf_token %}
                        <input type="hidden" name="next" value="{{ next }}">
                        <div class="mb-3">
                            <div class="form-floating mb-3">
                                {{ form.username }}
                                <label for="floatingInput">{{ form.username.label }}</label>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer px-5 pt-3">
                        <div class="d-grid gap-2 mt-2">
                            <button type="submit" class="btn btn-success btn-lg">
                                <i class="fas fa-sign-in-alt"></i> Enviar
                            </button>
                        </div>
                        <p class="mt-3 text-center fw-normal">
                            Retroceder al login <a href="{{ list_url }}"> da click aqui <i class="fas fa-user"></i></a>
                        </p>
                    </div>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
