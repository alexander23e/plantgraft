{% extends 'login/base.html' %}
{% load static %}
{% block head_login %}
    <script src="{% static 'login/js/login.js' %}"></script>
{% endblock %}

{% block content %}
    <div class="row d-flex justify-content-center">
        <div class="col-lg-5 mt-3">
            <form method="post" id="frmForm" autocomplete="off">
                <div class="card shadow">
                    <div class="card-header">
                        <p class="text-center text-icon">
                            <span class="fa-stack fa-3x"><i class="fa-solid fa-circle fa-stack-2x"></i><i class="{{ dashboard.get_icon }} fa-stack-1x logo"></i></span>
                        </p>
                        <h1 class="card-title text-center p-2 m-0">Inicio de Sesión</h1>
                    </div>
                    <div class="card-body p-4">
                        {% csrf_token %}
                        <input type="hidden" name="next" value="{{ next }}">
                        <div class="mb-3">
                            <div class="form-floating mb-3">
                                {{ form.username }}
                                <label for="floatingInput">{{ form.username.label }}</label>
                            </div>
                        </div>
                        <div class="input-group mb-3">
                            <div class="form-floating">
                                {{ form.password }}
                                <label for="floatingInput">{{ form.password.label }}</label>
                            </div>
                            <button class="input-group-text btn btn-success btnShowPassword" type="button">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="card-footer px-5 pt-3">
                        <div class="d-grid gap-2 mt-2">
                            <button type="submit" class="btn btn-success btn-lg">
                                <i class="fas fa-sign-in-alt"></i> Ingresar
                            </button>
                        </div>
                        <p class="mt-3 text-center fw-normal">
                            Si has olvidado tu contraseña <a href="{% url 'reset_password' %}">da click aqui
                            <i class="fas fa-key"></i></a>
                        </p>
                    </div>
                </div>
            </form>
        </div>
    </div>
    <script type="application/javascript">
        var errors = "";
        {% if form.errors %}
            {% for field in form %}
                {% for error in field.errors %}
                    errors += "{{ error }}\n";
                {% endfor %}
            {% endfor %}
            {% for error in form.non_field_errors %}
                errors += "{{ error }}\n";
            {% endfor %}
            Swal.fire({
                icon: 'error',
                title: 'Notificación',
                text: errors,
            });
        {% endif %}
    </script>
{% endblock %}
