<!-- ======= Header ======= -->
<header id="header" class="fixed-top ">
    <div class="container d-flex align-items-center">

        <h1 class="logo me-auto"><a href="{% url 'index' %}"><img src="{{ company.get_image }}" alt="" class="img-fluid"> {{ company.name|upper }}</a></h1>

        <nav id="navbar" class="navbar">
            <ul>
                <li><a class="nav-link scrollto active" href="{% if not initial %}/{% endif %}#hero">Home</a></li>
                <li><a class="nav-link scrollto" href="{% if not initial %}/{% endif %}#about">Acerca de nosotros</a></li>
                <li><a class="nav-link scrollto" href="{% if not initial %}/{% endif %}#services">Servicios</a></li>
                <li><a class="nav-link scrollto" href="{% if not initial %}/{% endif %}#portfolio">Productos</a></li>
                <li><a class="nav-link scrollto" href="{% if not initial %}/{% endif %}#faq">Preguntas frecuentes</a></li>
                <li><a class="nav-link scrollto" href="{% if not initial %}/{% endif %}#contact">Contactos</a></li>
                <li><a class="nav-link scrollto" href="{% url 'sign_in' %}">Registrarse</a></li>
                <li>
                    {% if request.user.is_superuser %}
                        <a class="nav-link" href="{% url 'dashboard' %}">Bienvenido {{ request.user.username }}</a>
                    {% else %}
                        <a class="getstarted scrollto" href="{% url 'login' %}">Iniciar Sesión</a>
                    {% endif %}
                </li>
            </ul>
            <i class="bi bi-list mobile-nav-toggle"></i>
        </nav>
        <!-- .navbar -->
    </div>
</header>
<!-- End Header -->
